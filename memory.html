<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>บันทึกการเดินทางของธาราและแตงโม</title>

<style>

body{
font-family: sans-serif;
background:#f7e4ea;
text-align:center;
margin:0;
}

/* หัวเว็บ */
.header{
font-size:40px;
color:#ff6fa0;
margin-top:20px;
animation:wave 3s infinite ease-in-out;
}

@keyframes wave{
0%{transform:translateY(0)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0)}
}

.container{
display:flex;
flex-wrap:wrap;
gap:30px;
padding:40px;
justify-content:center;
}

.album{
width:200px;
height:250px;
background:#ffd0dc;
border-radius:20px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.add{
border:3px dashed #ff8fab;
background:#fff;
font-size:40px;
color:#ff8fab;
}

.gallery{
display:none;
padding:20px;
}

.photo{
margin:20px;
}

.photo img{
width:200px;
border-radius:15px;
}

.date{
font-size:14px;
color:#666;
}

.caption{
font-size:13px;
color:#444;
}

button{
padding:8px 14px;
border:none;
border-radius:10px;
background:#ff8fab;
color:white;
cursor:pointer;
margin:5px;
}

</style>
</head>

<body>

<div class="header">
บันทึกการเดินทางของธาราและแตงโม 💗
</div>

<div id="albums" class="container"></div>

<div id="gallery" class="gallery">
<h2 id="albumTitle"></h2>

<input type="file" id="upload">

<div id="photos"></div>

<button onclick="back()">⬅ กลับ</button>
<button onclick="deleteAlbum()">🗑 ลบอัลบั้ม</button>
</div>

<script>

let albums = JSON.parse(localStorage.getItem("albums")) || [];
let current = null;

function save(){
localStorage.setItem("albums",JSON.stringify(albums));
}

function renderAlbums(){

const box=document.getElementById("albums");
box.innerHTML="";

albums.forEach((a,i)=>{

let div=document.createElement("div");
div.className="album";
div.onclick=()=>openAlbum(i);

div.innerHTML=`
<div>${a.cover ? `<img src="${a.cover}" style="width:100%;height:150px;object-fit:cover;border-radius:20px 20px 0 0;">`:""}</div>
<div>${a.name}</div>
`;

box.appendChild(div);

});

let add=document.createElement("div");
add.className="album add";
add.innerHTML="+";
add.onclick=createAlbum;

box.appendChild(add);

}

function createAlbum(){

let name=prompt("ตั้งชื่ออัลบั้ม");

if(!name)return;

albums.push({
name:name,
photos:[],
cover:null
});

save();
renderAlbums();

}

function openAlbum(i){

current=i;

document.getElementById("albums").style.display="none";
document.getElementById("gallery").style.display="block";

document.getElementById("albumTitle").innerText=albums[i].name;

renderPhotos();

}

function back(){

document.getElementById("gallery").style.display="none";
document.getElementById("albums").style.display="flex";

renderAlbums();

}

function renderPhotos(){

const box=document.getElementById("photos");
box.innerHTML="";

albums[current].photos.forEach((p,i)=>{

let div=document.createElement("div");
div.className="photo";

div.innerHTML=`
<img src="${p.img}">
<div class="date">📅 ${p.date}</div>
<div class="caption">✏️ ${p.caption}</div>
<button onclick="setCover(${i})">ตั้งเป็นหน้าปก</button>
`;

box.appendChild(div);

});

}

document.getElementById("upload").onchange=function(){

let file=this.files[0];

let reader=new FileReader();

reader.onload=function(){

let date=prompt("ใส่วันที่ของความทรงจำ");
let caption=prompt("คำบรรยายรูป");

albums[current].photos.push({
img:reader.result,
date:date,
caption:caption
});

save();
renderPhotos();

};

reader.readAsDataURL(file);

};

function setCover(i){

albums[current].cover=albums[current].photos[i].img;

save();
alert("ตั้งหน้าปกแล้ว");

}

function deleteAlbum(){

let code=prompt("ใส่รหัสเพื่อลบอัลบั้ม");

if(code==="200169"){

albums.splice(current,1);

save();

back();

}else{

alert("รหัสไม่ถูกต้อง");

}

}

renderAlbums();

</script>

</body>
</html>

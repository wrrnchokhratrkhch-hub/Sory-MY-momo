<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>บันทึกการเดินทางของธาราและแตงโม</title>

<style>

body{
font-family:sans-serif;
background:#f6e7ec;
text-align:center;
margin:0;
}

h1{
color:#ff6b9a;
margin-top:20px;
}

.container{
padding:20px;
}

.albumGrid{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
margin-top:30px;
}

.album{
width:200px;
height:200px;
background:#ffc0cb;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-weight:bold;
}

.addAlbum{
width:200px;
height:200px;
border:3px dashed #ff7b9c;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
cursor:pointer;
}

.photoGrid{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
margin-top:20px;
}

.photo{
width:200px;
}

.photo img{
width:200px;
border-radius:15px;
}

.date{
font-size:14px;
color:#555;
}

.caption{
font-size:13px;
color:#777;
margin-bottom:5px;
}

button{
background:#ff7b9c;
border:none;
color:white;
padding:6px 10px;
margin:3px;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>บันทึกการเดินทางของธาราและแตงโม 💗</h1>

<div class="container">

<div id="albums" class="albumGrid"></div>

<div id="albumView" style="display:none">

<h2 id="albumTitle"></h2>

<input type="file" id="photoInput">

<div id="photos" class="photoGrid"></div>

<br>

<button onclick="goHome()">← กลับ</button>
<button onclick="deleteAlbum()">🗑 ลบอัลบั้ม</button>

</div>

</div>

<script>

let albums = JSON.parse(localStorage.getItem("albums")) || [];

let current = null;

function save(){
localStorage.setItem("albums",JSON.stringify(albums));
}

function renderAlbums(){

let box=document.getElementById("albums");
box.innerHTML="";

albums.forEach((a,i)=>{

let div=document.createElement("div");
div.className="album";

div.onclick=()=>openAlbum(i);

div.innerHTML=a.cover ?
`<img src="${a.cover}" style="width:100%;height:100%;object-fit:cover;border-radius:20px">`
:
a.name;

box.appendChild(div);

});

let add=document.createElement("div");
add.className="addAlbum";
add.innerHTML="+";

add.onclick=()=>{

let name=prompt("ชื่ออัลบั้ม");

if(name){
albums.push({name,photos:[],cover:null});
save();
renderAlbums();
}

};

box.appendChild(add);

}

function openAlbum(i){

current=i;

document.getElementById("albums").style.display="none";
document.getElementById("albumView").style.display="block";

document.getElementById("albumTitle").innerText=albums[i].name;

renderPhotos();

}

function goHome(){

document.getElementById("albums").style.display="flex";
document.getElementById("albumView").style.display="none";

renderAlbums();

}

document.getElementById("photoInput").onchange=e=>{

let file=e.target.files[0];

let reader=new FileReader();

reader.onload=function(){

let date=prompt("วันที่ของความทรงจำ");
let caption=prompt("คำบรรยาย");

albums[current].photos.push({
img:reader.result,
date:date,
caption:caption
});

save();
renderPhotos();

};

reader.readAsDataURL(file);

};

function renderPhotos(){

let box=document.getElementById("photos");
box.innerHTML="";

albums[current].photos.forEach((p,i)=>{

let div=document.createElement("div");
div.className="photo";

div.innerHTML=`

<img src="${p.img}">

<div class="date">📅 ${p.date || "-"}</div>

<div class="caption">✏️ ${p.caption || "-"}</div>

<button onclick="editPhoto(${i})">✏️ แก้ไข</button>

<button onclick="deletePhoto(${i})">🗑 ลบรูป</button>

<button onclick="setCover(${i})">💗 ตั้งเป็นหน้าปก</button>

`;

box.appendChild(div);

});

}

function editPhoto(i){

let p=albums[current].photos[i];

let d=prompt("แก้ไขวันที่",p.date);
let c=prompt("แก้ไขคำบรรยาย",p.caption);

if(d!==null)p.date=d;
if(c!==null)p.caption=c;

save();
renderPhotos();

}

function deletePhoto(i){

if(confirm("ลบรูปนี้?")){

albums[current].photos.splice(i,1);

save();
renderPhotos();

}

}

function setCover(i){

albums[current].cover=albums[current].photos[i].img;

save();
renderAlbums();

}

function deleteAlbum(){

let pass=prompt("ใส่รหัสเพื่อลบอัลบั้ม");

if(pass==="200169"){

albums.splice(current,1);

save();

goHome();

}else{

alert("รหัสไม่ถูกต้อง");

}

}

renderAlbums();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>กำลังใจของเค้า 🤍</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#fff5f8;
    text-align:center;
}

.container{
    padding:20px;
}

.card{
    background:white;
    border-radius:25px;
    padding:25px;
    margin:20px auto;
    width:90%;
    max-width:400px;
    box-shadow:0 10px 20px rgba(0,0,0,0.08);
    position:relative;
}

.green{ background:#e9f7f1; }
.pink{ background:#ffeaf1; }
.blue{ background:#eaf2ff; }
.purple{ background:#f3e8ff; }

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#ff9db3;
    color:white;
    cursor:pointer;
}

input{
    margin-top:10px;
    padding:8px;
    border-radius:15px;
    border:1px solid #ddd;
    text-align:center;
}

.message{
    margin-top:15px;
    min-height:60px;
}

.cat{
    width:120px;
    margin-top:10px;
}

.heart{
    position:fixed;
    color:#ff5c8a;
    animation:floatUp 2s linear forwards;
    font-size:20px;
}

@keyframes floatUp{
    0%{opacity:1; transform:translateY(0);}
    100%{opacity:0; transform:translateY(-150px);}
}
</style>
</head>
<body>

<div class="container">

<!-- หมวดเหนื่อย -->
<div class="card green">
<h2>💛 หมวดเหนื่อย</h2>
<img src="myaowl-cute.gif" class="cat">
<div class="message" id="msg1"></div>
<button onclick="randomMsg(1)">สุ่มกำลังใจ</button>
</div>

<!-- หมวดเรียน -->
<div class="card blue">
<h2>📚 หมวดให้กำลังใจเรียน</h2>
<img src="myaowl-gatobesucon.gif" class="cat">
<div class="message" id="msg2"></div>
<button onclick="randomMsg(2)">สุ่มกำลังใจ</button>
</div>

<!-- หมวดรัก -->
<div class="card pink">
<h2>💌 หมวดบอกรักคิดถึง</h2>
<img src="heart-love.gif" class="cat">
<div class="message" id="msg3"></div>
<button onclick="randomMsg(3)">สุ่มข้อความรัก</button>
</div>

<!-- หมวดแฟน -->
<div class="card purple">
<h2>แฟน🙈🤭</h2>
<img src="nub-nub-cat.gif" class="cat">
<div class="message" id="msg4"></div>

<input type="password" id="lovePass" placeholder="ใส่รหัส(ขอเป็นแฟนวันไหนน้าาา)">
<br>
<button onclick="checkPassword()">ยืนยันรหัส</button>
<button onclick="randomMsg(4)" id="loveBtn" style="display:none;">สุ่มข้อความลับ</button>
</div>

</div>

<script>
const messages = {
1:[
"เหนื่อยได้ แต่อย่าลืมว่ามีเค้าอยู่ข้าง ๆ นะ 🤍",
"วันนี้เก่งมากแล้ว พักก่อนก็ได้ 💛",
"คนเก่งอ่านจนเหนื่อยแล้ว เติมขนมมั๊ย",
"เป็นกำลังใจให้คั้บ แฟนเค้าเก่งที่สุดอยู่แล้ว😊",
"โมของเค้าเก่งที่สุดในโลกเลยย🌍",
"มากอดๆเติมพลังนะคั้บ🫂",
"โลกอาจหนัก แต่เค้าจะช่วยถืออีกข้างหนึ่งนะ"
],
2:[
"อ่านไปอีกนิดนะ คนเก่งของเค้า 📚✨",
"ตั้งใจเรียนเดี๋ยวเราจะได้ตั้งใจรักกันเต็มที่ไง💖",
"ทุกความพยายามมันไม่สูญเปล่าเลย",
"ไม่ว่าผลจะเป็นยังไงโมก็พยามเต็มที่แล้วคั้บ",
"ตั้งใจขนา่ดนี้ ต้องAอยู่แล้ว",
"A A A A A A",
"พักบ้างนะคับคนเก่ง😋",
"เติมของหวานได้แล้วๆ⏱️",
"อนาคตกำลังรอคนเก่งอย่างที่รักอยู่นะ"
],
3:[
"คิดถึงนะ แบบมาก ๆ เลย 💖",
"รักโมทุกวัน รักเหมือนเดิม รักที่สุด 😋",
"คิดถึงงๆๆๆ",
"ไหนที่รักมาเติมจุ๊บๆโหน่ยย😗",
"จะถามว่ารักกี่ครั้ง คำตอบก็เหมือนเดิมคับ",
"ธาราน้อยจะชื่ออะไรดี555",
"ต่อให้ไม่พูดทุกวัน ก็รักทุกวันนะ",
"เธอคือความสบายใจของเค้าเสมอ"
],
4:[
"วันนี้เหนื่อยมั้ย เดี๋ยวเค้านวดให้…แต่คิดเงินเป็นจุ๊บนะ 😗",
"ถ้าที่รักโอเค เค้าขอบีบคอตอนทำได้มั๊ย",
"ถ้าฝากรอยไว้ที่รักจะชอบมั๊ยคั้บ😵‍💫",
"ขอนอนกอดเฉยๆได้มั๊ย สัญญาคับ🙈",
"ที่รักอยากมั๊ยย แต่เค้าอยากมากๆคับ🥺",
"คิดถึงแบบอยากดึงมากอดแน่น ๆ เลย 🙈",
"ถ้าอยู่ใกล้ ๆ ตอนนี้ ไม่รับประกันมือปลาหมึกนะ 🤭",
"ตัวแค่นี้จะมาขโมยใจเค้าอีกแล้วเหรอ",
"อยากซุกแขนแล้วบอกว่าเป็นของเค้าคนเดียว",
"อยากเติมจูบบคั้บ แบบนานๆเลย",
"ถ้าไม่ว่าอะไร ขอหม่ำๆได้มั๊ยคับ🥺",
"สุ่มได้รึ ต้องให้เค้าจับ🍼นะ",
"คืนนี้ฝันถึงเค้านะ ไม่งั้นงอนจริง ๆ 😳",
"รู้มั้ยว่าเธอน่ารักจนเค้าอยาก...ทุกวันเลย"
]
};

function randomMsg(type){
const msgBox = document.getElementById("msg"+type);
const random = messages[type][Math.floor(Math.random()*messages[type].length)];
msgBox.innerText = random;
createHeart();
}

function checkPassword(){
const input = document.getElementById("lovePass").value;
if(input === "200169"){
    document.getElementById("loveBtn").style.display = "inline-block";
    alert("รหัสถูกต้อง 🙈 เปิดโหมดแฟนแล้ว");
}else{
    alert("รหัสไม่ถูกนะงับ 🤫");
}
}

function createHeart(){
const heart = document.createElement("div");
heart.className = "heart";
heart.innerText = "💖";
heart.style.left = Math.random()*window.innerWidth + "px";
heart.style.top = (window.innerHeight-50) + "px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),2000);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>บันทึกการเดินทางของธาราและแตงโม</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#fff0f5;
overflow-x:auto;
overflow-y:auto;
}

/* หัวข้อเว็บ */

.header{
text-align:center;
font-size:36px;
font-weight:bold;
color:#ff6fa5;
margin-top:30px;
animation:wave 3s ease-in-out infinite;
}

@keyframes wave{
0%{transform:translateY(0)}
50%{transform:translateY(-6px)}
100%{transform:translateY(0)}
}

/* timeline */

.timeline{
display:flex;
gap:40px;
padding:160px 60px;
min-height:100vh;
align-items:center;
}

/* การ์ดอัลบั้ม */

.album{
min-width:220px;
height:240px;
border-radius:25px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:20px;
font-weight:bold;
color:#444;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.25s;
}

.album:hover{
transform:scale(1.05);
}

/* ปุ่มเพิ่ม */

.add{
background:white;
border:3px dashed #ff9db3;
font-size:50px;
color:#ff9db3;
}

/* modal */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
justify-content:center;
align-items:center;
}

.modalContent{
background:white;
padding:25px;
border-radius:20px;
width:320px;
text-align:center;
}

.modalContent input,
.modalContent textarea,
.modalContent select{
width:90%;
margin:8px 0;
padding:8px;
border-radius:10px;
border:1px solid #ddd;
}

button{
padding:8px 18px;
border:none;
border-radius:20px;
background:#ff9db3;
color:white;
cursor:pointer;
}

/* gallery */

.gallery{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
overflow:auto;
padding:30px;
}

.gallery img{
width:200px;
border-radius:15px;
margin:10px;
}

.closeBtn{
position:fixed;
top:20px;
right:30px;
font-size:28px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
บันทึกการเดินทางของธาราและแตงโม 💗
</div>

<div class="timeline" id="timeline">

<div class="album add" onclick="openModal()">+</div>

</div>

<!-- modal เพิ่มอัลบั้ม -->

<div class="modal" id="modal">

<div class="modalContent">

<h3>สร้างอัลบั้มใหม่</h3>

<input id="albumName" placeholder="ชื่ออัลบั้ม">

<select id="albumColor">
<option value="#ffd6e7">ชมพู</option>
<option value="#e6d8ff">ม่วง</option>
<option value="#d6f3ff">ฟ้า</option>
<option value="#ffe9c9">พีช</option>
</select>

<button onclick="createAlbum()">สร้าง</button>

</div>

</div>

<!-- gallery -->

<div class="gallery" id="gallery">

<div class="closeBtn" onclick="closeGallery()">✕</div>

<h2 id="galleryTitle"></h2>

<input type="file" multiple onchange="addPhotos(event)">

<div id="photoContainer"></div>

</div>

<script>

let albums = {}

function openModal(){
document.getElementById("modal").style.display="flex"
}

function createAlbum(){

let name=document.getElementById("albumName").value
let color=document.getElementById("albumColor").value

if(!name)return

let album=document.createElement("div")

album.className="album"
album.style.background=color
album.innerText=name

album.onclick=()=>openGallery(name)

document.getElementById("timeline").insertBefore(
album,
document.querySelector(".add")
)

albums[name]=[]

document.getElementById("modal").style.display="none"
document.getElementById("albumName").value=""

}

function openGallery(name){

document.getElementById("gallery").style.display="block"
document.getElementById("galleryTitle").innerText=name

window.currentAlbum=name

renderPhotos()

explodeHearts()

}

function closeGallery(){
document.getElementById("gallery").style.display="none"
}

function addPhotos(e){

let files=e.target.files

for(let file of files){

let url=URL.createObjectURL(file)

albums[currentAlbum].push(url)

}

renderPhotos()

}

function renderPhotos(){

let container=document.getElementById("photoContainer")
container.innerHTML=""

albums[currentAlbum].forEach(src=>{

let img=document.createElement("img")
img.src=src

container.appendChild(img)

})

}

/* เอฟเฟกต์หัวใจ */

function explodeHearts(){

for(let i=0;i<20;i++){

let heart=document.createElement("div")

heart.innerText=Math.random()>0.5?"💖":"💗"

heart.style.position="fixed"
heart.style.left=window.innerWidth/2+"px"
heart.style.top=window.innerHeight/2+"px"
heart.style.fontSize="24px"

let x=(Math.random()-0.5)*600
let y=(Math.random()-0.5)*400

heart.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x}px,${y}px)`,opacity:0}
],{duration:1000})

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),1000)

}

}

</script>

</body>
</html>

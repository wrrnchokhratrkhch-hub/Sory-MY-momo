<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Memory</title>
  <style>
    body{
      font-family: Arial;
      max-width:600px;
      margin:auto;
      padding:20px;
    }
    input,button{
      padding:8px;
      margin:5px 0;
    }
    .memory{
      border:1px solid #ddd;
      padding:10px;
      margin-top:10px;
      border-radius:6px;
    }
  </style>
</head>
<body>

<h2>Memory List</h2>

<input id="memoryInput" placeholder="Write memory..." />
<button onclick="addMemory()">Add</button>

<div id="memoryList"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


const memoryList = document.getElementById("memoryList");


async function loadMemory(){

  memoryList.innerHTML = "";

  const querySnapshot = await getDocs(collection(db,"memories"));

  querySnapshot.forEach((docItem)=>{

    const data = docItem.data();

    const div = document.createElement("div");
    div.className = "memory";

    div.innerHTML = `
      <p>${data.text}</p>
      <button onclick="deleteMemory('${docItem.id}')">Delete</button>
    `;

    memoryList.appendChild(div);

  });
}


window.addMemory = async function(){

  const text = document.getElementById("memoryInput").value;

  if(text==="") return;

  await addDoc(collection(db,"memories"),{
    text:text,
    time:Date.now()
  });

  document.getElementById("memoryInput").value="";

  loadMemory();

}


window.deleteMemory = async function(id){

  await deleteDoc(doc(db,"memories",id));

  loadMemory();

}


loadMemory();

</script>

</body>
</html>
